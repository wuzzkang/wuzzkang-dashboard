<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Preview Sandbox</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3b82f6', 
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col antialiased text-slate-800 bg-transparent">
    <!-- Container for dynamic component rendering -->
    <div id="app" class="flex-grow flex flex-col w-full"></div>

    <script type="module">
        // Version stamp — bump this (matching LP_VERSION in wuzzkang-lp/script.js) 
        // to invalidate cached template modules after a deployment to GitHub Pages.
        const PREVIEW_VERSION = '1.2.9';
        const cacheBust = `?v=${PREVIEW_VERSION}`;

        // Global Branding Config
        const BRAND_CONFIG = {
            name: 'Siluet',
            domain: 'siluet.web.id'
        };

        // ── Race Condition Guard ─────────────────────────────────────────────
        // Incremented each time a new UPDATE_PREVIEW arrives.
        // The async section-render loop checks this before appending each
        // section so stale / in-flight renders are abandoned immediately.
        let renderGeneration = 0;

        // Capture unhandled script errors
        window.addEventListener('error', (event) => {
            const appEl = document.getElementById('app');
            if (appEl) {
                appEl.innerHTML = `<div class="p-6 text-red-550 font-bold text-center">Unhandled Error: ${event.message} at ${event.filename}:${event.lineno}</div>`;
            }
        });

        // Capture unhandled promise rejections
        window.addEventListener('unhandledrejection', (event) => {
            const appEl = document.getElementById('app');
            if (appEl) {
                appEl.innerHTML = `<div class="p-6 text-red-550 font-bold text-center">Unhandled Promise Rejection: ${event.reason?.message || event.reason}</div>`;
            }
        });

        // Notify parent that iframe is ready to receive postMessage data
        window.parent.postMessage({ type: 'IFRAME_READY' }, '*');

        window.addEventListener('message', async (event) => {
            if (event.data && event.data.type === 'UPDATE_PREVIEW') {
                const { pageData } = event.data;
                const templateType = pageData.meta?.template_type || 'store';
                const designKey = pageData.meta?.design_key || 'sage-green';
                const appEl = document.getElementById('app');

                // Clear previous body style overrides from templates
                document.body.style.overflow = 'auto';

                if (templateType === 'wedding') {
                    try {
                        const templateVersion = pageData.meta?.template_version || 1;
                        const resolvedFile = templateVersion <= 1 ? `${designKey}.js` : `${designKey}-v${templateVersion}.js`;
                        const module = await import(`./templates/wedding/${resolvedFile}${cacheBust}`);
                        await module.render(pageData, 'Nama Tamu Undangan');
                        const coverEl = document.getElementById('invitation-cover');
                        if (coverEl) coverEl.style.display = 'none';
                        const mainContentEl = document.getElementById('main-content');
                        if (mainContentEl) {
                            mainContentEl.classList.remove('opacity-0');
                            mainContentEl.style.opacity = '1';
                        }
                        document.body.style.overflow = 'auto';
                    } catch (err) {
                        appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat template: ${err.message}</div>`;
                    }
                } else if (templateType === 'toko-online') {
                    try {
                        const templateVersion = pageData.meta?.template_version || 1;
                        const resolvedFile = templateVersion <= 1 ? `${designKey}.js` : `${designKey}-v${templateVersion}.js`;
                        const module = await import(`./templates/toko-online/${resolvedFile}${cacheBust}`);
                        await module.render(pageData, 'Tamu');
                    } catch (err) {
                        appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat template: ${err.message}</div>`;
                    }
                } else if (templateType === 'campaign') {
                    try {
                        const templateVersion = pageData.meta?.template_version || 1;
                        const resolvedFile = templateVersion <= 1 ? `${designKey}.js` : `${designKey}-v${templateVersion}.js`;
                        const module = await import(`./templates/campaign/${resolvedFile}${cacheBust}`);
                        await module.render(pageData, 'Tamu');
                    } catch (err) {
                        appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat template: ${err.message}</div>`;
                    }
                } else if (templateType === 'birthday') {
                    try {
                        const templateVersion = pageData.meta?.template_version || 1;
                        const resolvedFile = templateVersion <= 1 ? `${designKey}.js` : `${designKey}-v${templateVersion}.js`;
                        const module = await import(`./templates/birthday/${resolvedFile}${cacheBust}`);
                        await module.render(pageData, 'Nama Tamu Undangan');
                    } catch (err) {
                        appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat template: ${err.message}</div>`;
                    }
                } else if (templateType === 'cv') {
                    try {
                        const templateVersion = pageData.meta?.template_version || 1;
                        const resolvedFile = templateVersion <= 1 ? `${designKey}.js` : `${designKey}-v${templateVersion}.js`;
                        const module = await import(`./templates/cv/${resolvedFile}${cacheBust}`);
                        await module.render(pageData, '', BRAND_CONFIG);
                    } catch (err) {
                        appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat template CV: ${err.message}</div>`;
                    }
                } else if (templateType === 'e-course') {
                    try {
                        const templateVersion = pageData.meta?.template_version || 1;
                        const resolvedFile = templateVersion <= 1 ? `${designKey}.js` : `${designKey}-v${templateVersion}.js`;
                        const module = await import(`./templates/e-course/${resolvedFile}${cacheBust}`);
                        await module.render(pageData, 'Tamu');
                    } catch (err) {
                        appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat template E-Course: ${err.message}</div>`;
                    }
                } else if (templateType === 'jasa') {
                    try {
                        const templateVersion = pageData.meta?.template_version || 1;
                        const resolvedFile = templateVersion <= 1 ? `${designKey}.js` : `${designKey}-v${templateVersion}.js`;
                        const module = await import(`./templates/jasa/${resolvedFile}${cacheBust}`);
                        await module.render(pageData, 'Tamu', BRAND_CONFIG);
                    } catch (err) {
                        appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat template Jasa: ${err.message}</div>`;
                    }
                } else if (templateType === 'dynamic-builder') {
                    // ── Claim a new render generation slot ──────────────────
                    // Any older in-flight render that checks this value will
                    // detect it has been superseded and return early.
                    const myGeneration = ++renderGeneration;

                    try {
                        if (!document.getElementById('dynamic-builder-styles')) {
                             const style = document.createElement('style');
                             style.id = 'dynamic-builder-styles';
                             style.innerHTML = `
                                 .jasa-navy       { background-color: #0f2e4c; }
                                 .jasa-navy-dark  { background-color: #0a1f35; }
                                 .jasa-navy-mid   { background-color: #163654; }
                                 .jasa-orange     { background-color: #f97316; }
                                 .jasa-orange-text{ color: #f97316; }
                                 .jasa-white-text { color: #ffffff; }
                                 .jasa-navy-text  { color: #0f2e4c; }

                                 .btn-orange {
                                     display: inline-block;
                                     background-color: #f97316;
                                     color: #ffffff;
                                     font-weight: 700;
                                     padding: 0.85rem 2rem;
                                     border-radius: 0.5rem;
                                     text-decoration: none;
                                     transition: all 0.25s ease;
                                     border: 2px solid #f97316;
                                     cursor: pointer;
                                     font-size: 0.9rem;
                                     letter-spacing: 0.02em;
                                 }
                                 .btn-orange:hover {
                                     background-color: #ea6c0a;
                                     border-color: #ea6c0a;
                                     transform: translateY(-2px);
                                     box-shadow: 0 8px 24px rgba(249,115,22,0.35);
                                 }

                                 .btn-outline-white {
                                     display: inline-block;
                                     background-color: transparent;
                                     color: #ffffff;
                                     font-weight: 700;
                                     padding: 0.85rem 2rem;
                                     border-radius: 0.5rem;
                                     text-decoration: none;
                                     transition: all 0.25s ease;
                                     border: 2px solid rgba(255,255,255,0.6);
                                     cursor: pointer;
                                     font-size: 0.9rem;
                                     letter-spacing: 0.02em;
                                 }
                                 .btn-outline-white:hover {
                                     background-color: rgba(255,255,255,0.1);
                                     border-color: #ffffff;
                                     transform: translateY(-2px);
                                 }

                                 .btn-outline-navy {
                                     display: inline-block;
                                     background-color: transparent;
                                     color: #0f2e4c;
                                     font-weight: 700;
                                     padding: 0.85rem 2rem;
                                     border-radius: 0.5rem;
                                     text-decoration: none;
                                     transition: all 0.25s ease;
                                     border: 2px solid #0f2e4c;
                                     cursor: pointer;
                                     font-size: 0.9rem;
                                     letter-spacing: 0.02em;
                                 }
                                 .btn-outline-navy:hover {
                                     background-color: #0f2e4c;
                                     color: #ffffff;
                                     transform: translateY(-2px);
                                 }
                             `;
                             document.head.appendChild(style);
                         }

                        appEl.innerHTML = '';

                        const rawSections = pageData.content?.sections || [];

                        // ── Deduplicate by type (final safety net in the renderer) ──
                        const seenTypes = new Set();
                        const sections = [];
                        for (const sec of rawSections) {
                            if (!seenTypes.has(sec.type)) {
                                seenTypes.add(sec.type);
                                sections.push(sec);
                            }
                        }

                        for (const section of sections) {
                            // ── Abandon if a newer render has taken over ────
                            if (renderGeneration !== myGeneration) return;

                            const sectionType = section.type;
                            const sectionVariant = section.variant || (
                                sectionType === 'hero'         ? 'split-navy'     :
                                sectionType === 'about'        ? 'simple-navy'    :
                                sectionType === 'services'     ? 'grid-navy'      :
                                sectionType === 'pricing'      ? 'grid-navy'      :
                                sectionType === 'faq'          ? 'accordion-navy' :
                                sectionType === 'social_proof' ? 'navy'           :
                                'footer-navy'
                            );
                            const moduleName = `${sectionType}-${sectionVariant}.js`;
                            const module = await import(`./templates/components/sections/${sectionType}/${moduleName}${cacheBust}`);

                            // ── Check again after async import ──────────────
                            if (renderGeneration !== myGeneration) return;

                            const sectionHtml = module.render(section.content || {}, BRAND_CONFIG);
                            appEl.insertAdjacentHTML('beforeend', sectionHtml);
                        }
                    } catch (err) {
                        if (renderGeneration === myGeneration) {
                            appEl.innerHTML = `<div class="p-6 text-red-500 font-bold text-center">Gagal memuat dynamic builder: ${err.message}</div>`;
                        }
                    }
                } else {
                    // Default mockup preview for Store template
                    appEl.innerHTML = `
                        <div class="min-h-screen flex items-center justify-center p-8 bg-slate-900 text-white text-center">
                            <div>
                                <h2 class="text-2xl font-bold mb-2">${pageData.meta?.title || 'Draft Page'}</h2>
                                <p class="text-sm text-slate-400">Template Store preview is handled natively. Live URL will compile static assets.</p>
                            </div>
                        </div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
